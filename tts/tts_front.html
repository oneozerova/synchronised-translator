<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Streaming TTS demo</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 24px auto; line-height: 1.4; }
    textarea, input, button { width: 100%; box-sizing: border-box; margin: 6px 0 14px; padding: 10px; }
    textarea { min-height: 140px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    pre { background: #111; color: #ddd; padding: 12px; overflow: auto; min-height: 180px; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <h2>Streaming TTS demo</h2>

  <div class="row">
    <div>
      <label>Reference audio (WAV). Можно не выбирать — тогда отправится тишина.</label>
      <input id="refAudio" type="file" accept=".wav,audio/wav" />
    </div>
    <div>
      <label>Reference text</label>
      <input id="refText" type="text" value="Это тестовая референсная фраза." />
    </div>
  </div>

  <label>Text</label>
  <textarea id="text">Привет это демонстрация потоковой генерации речи в реальном времени с отправкой кусками по десять слов и немедленным началом воспроизведения по мере прихода аудио фрагментов.</textarea>

  <button id="startBtn">Start</button>

  <p>
    <b>Status:</b> <span id="status">idle</span><br />
    <b>Last chunk latency:</b> <span id="latency">-</span> ms
  </p>

  <p class="muted">
    Метрика latency считается как разница между временем отправки последнего слова в 10-словном куске и моментом, когда первый аудиоблок этого куска запланирован к воспроизведению.
  </p>

  <pre id="log"></pre>

<script>
const WS_URL = "wss://apollo2.ci.nsu.ru/i.kadilenko/proxy/8003/api/generate";
const WORDS_PER_CHUNK = 10;
const WORD_INTERVAL_MS = 0;
const SAMPLE_RATE = 24000;

let ws = null;
let audioCtx = null;
let nextPlaybackTime = 0;

let chunkSeq = 0;
let wordTimer = null;
let sourceWords = [];
let wordIndex = 0;
let pendingWords = [];

const sentAt = new Map();          // chunkSeq -> performance.now()
const chunkText = new Map();       // chunkSeq -> text
const firstPlaybackLogged = new Set();

function logLine(msg) {
  const el = document.getElementById("log");
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}

function setStatus(text) {
  document.getElementById("status").textContent = text;
}

function bytesToBase64(bytes) {
  let binary = "";
  const chunkSize = 0x8000;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    const slice = bytes.subarray(i, i + chunkSize);
    binary += String.fromCharCode.apply(null, slice);
  }
  return btoa(binary);
}

function makeSilentWavBase64(seconds = 1, sampleRate = SAMPLE_RATE) {
  const numSamples = Math.floor(seconds * sampleRate);
  const dataSize = numSamples * 2;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  function writeString(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }

  writeString(0, "RIFF");
  view.setUint32(4, 36 + dataSize, true);
  writeString(8, "WAVE");
  writeString(12, "fmt ");
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);      // PCM
  view.setUint16(22, 1, true);      // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(36, "data");
  view.setUint32(40, dataSize, true);

  const bytes = new Uint8Array(buffer);
  return bytesToBase64(bytes);
}

async function fileToBase64(file) {
  if (!file) return makeSilentWavBase64(1);
  const arrayBuffer = await file.arrayBuffer();
  const bytes = new Uint8Array(arrayBuffer);
  return bytesToBase64(bytes);
}

function pcm16ToFloat32(int16) {
  const out = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) out[i] = int16[i] / 32768;
  return out;
}

function scheduleAudioChunk(chunkSeqFromServer, partSeq, pcmBytesLength, pcmArrayBuffer) {
  const pcm = new Int16Array(pcmArrayBuffer, 12, pcmBytesLength / 2);
  const float32 = pcm16ToFloat32(pcm);

  const buffer = audioCtx.createBuffer(1, float32.length, SAMPLE_RATE);
  buffer.copyToChannel(float32, 0);

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.connect(audioCtx.destination);

  const startTime = Math.max(nextPlaybackTime, audioCtx.currentTime + 0.03);
  source.start(startTime);
  nextPlaybackTime = startTime + buffer.duration;

  if (!firstPlaybackLogged.has(chunkSeqFromServer)) {
    firstPlaybackLogged.add(chunkSeqFromServer);

    const sent = sentAt.get(chunkSeqFromServer);
    const info = chunkText.get(chunkSeqFromServer);
    if (sent != null) {
      const scheduledStartMs = performance.now() + (startTime - audioCtx.currentTime) * 1000;
      const latency = scheduledStartMs - sent;
      document.getElementById("latency").textContent = latency.toFixed(1);
      logLine(`chunk ${chunkSeqFromServer} | latency ${latency.toFixed(1)} ms | "${info ?? ""}"`);
    }
  }
}

function sendChunk(text) {
  const seq = chunkSeq++;
  sentAt.set(seq, performance.now());
  chunkText.set(seq, text);
  ws.send(JSON.stringify({
    event: "chunk",
    seq,
    text,
  }));
}

function flushPending() {
  if (pendingWords.length === 0) return;
  const text = pendingWords.join(" ");
  pendingWords = [];
  sendChunk(text);
}

function startWordStreaming() {
  setStatus("sending text");

  sourceWords = document.getElementById("text").value.trim().split(/\s+/).filter(Boolean);
  wordIndex = 0;
  pendingWords = [];
  chunkSeq = 0;
  sentAt.clear();
  chunkText.clear();
  firstPlaybackLogged.clear();
  nextPlaybackTime = audioCtx.currentTime + 0.15;

  wordTimer = setInterval(() => {
    if (wordIndex >= sourceWords.length) {
      clearInterval(wordTimer);
      wordTimer = null;
      flushPending();
      ws.send(JSON.stringify({ event: "end" }));
      setStatus("waiting for audio");
      return;
    }

    pendingWords.push(sourceWords[wordIndex]);
    wordIndex += 1;

    if (pendingWords.length >= WORDS_PER_CHUNK) {
      flushPending();
    }
  }, WORD_INTERVAL_MS);
}

async function start() {
  document.getElementById("log").textContent = "";
  document.getElementById("latency").textContent = "-";

  setStatus("connecting");
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
  await audioCtx.resume();

  ws = new WebSocket(WS_URL);
  ws.binaryType = "arraybuffer";

  ws.onopen = async () => {
    setStatus("socket open");
    const file = document.getElementById("refAudio").files[0] || null;
    const refAudioBase64 = await fileToBase64(file);

    ws.send(JSON.stringify({
      event: "start",
      ref_audio: refAudioBase64,
      ref_text: document.getElementById("refText").value || "",
      lang: "Russian",
    }));
  };

  ws.onmessage = (evt) => {
    if (typeof evt.data === "string") {
      const msg = JSON.parse(evt.data);

      if (msg.event === "started") {
        setStatus("streaming");
        logLine(`started | sample_rate=${msg.sample_rate} | stream_chunk_size=${msg.stream_chunk_size}`);
        startWordStreaming();
        return;
      }

      if (msg.event === "chunk_begin") {
        logLine(`chunk_begin ${msg.seq} | words=${msg.words}`);
        return;
      }

      if (msg.event === "chunk_end") {
        logLine(`chunk_end ${msg.seq} | parts=${msg.parts} | model_first_audio_ms=${msg.first_audio_ms}`);
        return;
      }

      if (msg.event === "done") {
        setStatus("done");
        logLine("done");
        return;
      }

      if (msg.event === "error") {
        setStatus("error");
        logLine(`error: ${msg.message}`);
        return;
      }

      logLine(`json: ${evt.data}`);
      return;
    }

    const buffer = evt.data;
    const view = new DataView(buffer);
    const chunkSeqFromServer = view.getUint32(0, true);
    const partSeq = view.getUint32(4, true);
    const pcmLen = view.getUint32(8, true);

    scheduleAudioChunk(chunkSeqFromServer, partSeq, pcmLen, buffer);
  };

  ws.onerror = () => {
    setStatus("ws error");
    logLine("websocket error");
  };

  ws.onclose = () => {
    if (document.getElementById("status").textContent !== "done") {
      setStatus("closed");
    }
  };
}

document.getElementById("startBtn").addEventListener("click", start);
</script>
</body>
</html>
