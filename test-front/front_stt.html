<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>STT Client</title>
<style>
body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; }
button {
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  background: #f63366;
  color: white;
  cursor: pointer;
}
button.active { background: #555; }
#status { margin-top: 10px; color: #666; }
#output {
  margin-top: 15px;
  padding: 15px;
  background: #f5f5f5;
  border-radius: 6px;
  min-height: 120px;
}
</style>
</head>
<body>

<h2>🎙️ Speech → Text</h2>

<input type="file" id="file" accept="audio/*"><br><br>

<button id="btn">🎙️ Start</button>
<div id="status">Idle</div>

<audio id="player" controls style="width:100%; margin-top:10px;"></audio>

<div id="output"><span id="committed"></span></div>

<script>
const WS_URL = "ws://localhost:8000/ws";
const SAMPLE_RATE = 16000;
const CHUNK_SEC = 0.25;

let ws, audioCtx, processor, source, stream;
let recording = false;
let buffer = [];
let fileData = null;

document.getElementById("file").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const arrayBuffer = await file.arrayBuffer();
  fileData = {
    buffer: arrayBuffer,
    mime: file.type
  };
};

document.getElementById("btn").onclick = () => {
  recording ? stop() : start();
};

async function start() {
  recording = true;
  setBtn(true);
  setStatus("Connecting...");
  document.getElementById("committed").textContent = "";

  ws = new WebSocket(WS_URL);
  ws.binaryType = "arraybuffer";

  ws.onopen = async () => {
    if (fileData) {
      setStatus("Playing + streaming file");

      const player = document.getElementById("player");
      player.src = URL.createObjectURL(new Blob([fileData.buffer], { type: fileData.mime }));
      await player.play().catch(()=>{});

      await streamFile(fileData.buffer);
    } else {
      setStatus("Recording mic");

      stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });
      source = audioCtx.createMediaStreamSource(stream);
      processor = audioCtx.createScriptProcessor(4096, 1, 1);

      const chunkSamples = SAMPLE_RATE * CHUNK_SEC;

      processor.onaudioprocess = (e) => {
        buffer.push(...e.inputBuffer.getChannelData(0));

        while (buffer.length >= chunkSamples) {
          const chunk = new Float32Array(buffer.splice(0, chunkSamples));
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(chunk.buffer);
          }
        }
      };

      source.connect(processor);
      processor.connect(audioCtx.destination);
    }
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      document.getElementById("committed").textContent = data.stable || "";
    } catch {}
  };

  ws.onclose = () => {
    if (recording) setStatus("Connection closed");
    stop();
  };

  ws.onerror = () => {
    setStatus("WS error");
    stop();
  };
}

async function streamFile(arrayBuffer) {
  const ctx = new AudioContext();
  const decoded = await ctx.decodeAudioData(arrayBuffer.slice(0));

  const offline = new OfflineAudioContext(
    1,
    Math.ceil(decoded.duration * 16000),
    16000
  );

  const src = offline.createBufferSource();
  src.buffer = decoded;
  src.connect(offline.destination);
  src.start();

  const rendered = await offline.startRendering();
  const samples = rendered.getChannelData(0);

  const chunkSamples = SAMPLE_RATE * CHUNK_SEC;

  for (let i = 0; i < samples.length && recording; i += chunkSamples) {
    const end = Math.min(i + chunkSamples, samples.length);
    const chunk = new Float32Array(samples.subarray(i, end));

    if (ws.readyState === WebSocket.OPEN) {
      ws.send(chunk.buffer);
    }

    await sleep(CHUNK_SEC * 1000);
  }
}

function stop() {
  recording = false;
  setBtn(false);
  setStatus("Stopped");

  if (processor) processor.disconnect();
  if (source) source.disconnect();
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (ws) ws.close();

  const player = document.getElementById("player");
  player.pause();
  player.currentTime = 0;

  buffer = [];
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function setBtn(active) {
  const b = document.getElementById("btn");
  b.textContent = active ? "⏹️ Stop" : "🎙️ Start";
  b.className = active ? "active" : "";
}

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}
</script>

</body>
</html>
