<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Audio Echo MVP</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; }
        button { padding: 0.5rem 1rem; margin: 0.25rem; font-size: 1rem; }
        #status { margin-top: 1rem; color: #555; }
        .error { color: #c00; }
    </style>
</head>
<body>
    <h2>🎙️ Audio Echo MVP</h2>
    <button id="start">▶️ Start</button>
    <button id="stop" disabled>⏹️ Stop</button>
    <div id="status"></div>

    <script>
        let ws = null;
        let mediaRecorder = null;
        let mediaSource = null;
        let sourceBuffer = null;
        let audio = null;

        let startedPlayback = false;
        let startTime = null;
        let isRecordingStopped = false;
        let statusEl = document.getElementById("status");

        function setStatus(msg, isError = false) {
            statusEl.textContent = msg;
            statusEl.className = isError ? "error" : "";
            console.log(msg);
        }

        function cleanup() {
            // Останавливаем рекордер
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }

            // Завершаем MediaSource
            if (mediaSource && mediaSource.readyState === "open") {
                try {
                    mediaSource.endOfStream();
                } catch (e) {
                    console.warn("endOfStream error:", e);
                }
            }

            // Закрываем WebSocket
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }

            // Сбрасываем флаги
            isRecordingStopped = true;
            startedPlayback = false;
            document.getElementById("stop").disabled = true;
            document.getElementById("start").disabled = false;
        }

        document.getElementById("start").onclick = async () => {
            // Сброс состояния
            isRecordingStopped = false;
            startedPlayback = false;
            document.getElementById("start").disabled = true;
            document.getElementById("stop").disabled = false;
            setStatus("Connecting...");

            try {
                // 🔌 WebSocket
                ws = new WebSocket("ws://127.0.0.1:8000/ws");
                ws.binaryType = "arraybuffer";

                // 🎧 MediaSource для потокового воспроизведения
                mediaSource = new MediaSource();
                audio = new Audio();
                audio.src = URL.createObjectURL(mediaSource);
                audio.autoplay = true;

                await new Promise((resolve, reject) => {
                    mediaSource.addEventListener("sourceopen", resolve, { once: true });
                    mediaSource.addEventListener("error", reject, { once: true });
                });

                sourceBuffer = mediaSource.addSourceBuffer('audio/webm; codecs="opus"');
                sourceBuffer.mode = "segments"; // Важно для стриминга

                // 🎤 Запрос микрофона
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: "audio/webm;codecs=opus"
                });

                startTime = Date.now();

                // 📤 Отправка аудио на сервер
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0 && ws?.readyState === WebSocket.OPEN && !isRecordingStopped) {
                        ws.send(event.data);
                    }
                };

                // 📥 Получение данных + воспроизведение
                ws.onmessage = (event) => {
                    // ❗ Игнорируем данные после остановки
                    if (isRecordingStopped || !sourceBuffer) return;

                    try {
                        if (sourceBuffer.updating) {
                            // Если буфер занят — пропускаем кадр (можно добавить очередь)
                            return;
                        }
                        sourceBuffer.appendBuffer(event.data);

                        // 🎬 Запуск воспроизведения с небольшой задержкой
                        if (!startedPlayback && Date.now() - startTime > 1000) {
                            audio.play().catch(err => {
                                if (err.name !== "NotAllowedError") {
                                    console.error("Playback error:", err);
                                }
                            });
                            startedPlayback = true;
                            setStatus("🔊 Playing...");
                        }
                    } catch (e) {
                        console.warn("appendBuffer error:", e);
                    }
                };

                ws.onopen = () => {
                    setStatus("🎙️ Recording...");
                    mediaRecorder.start(250); // чанки каждые 250 мс
                };

                ws.onclose = () => {
                    if (!isRecordingStopped) {
                        setStatus("⚠️ Connection lost", true);
                    }
                    cleanup();
                };

                ws.onerror = (err) => {
                    setStatus("❌ WebSocket error", true);
                    console.error("WS error:", err);
                    cleanup();
                };

            } catch (err) {
                setStatus(`❌ ${err.message}`, true);
                console.error(err);
                cleanup();
            }
        };

        document.getElementById("stop").onclick = () => {
            setStatus("⏹️ Stopping...");
            isRecordingStopped = true;

            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }

            // Даём время на отправку финального чанка и завершение буфера
            setTimeout(() => {
                cleanup();
                setStatus("✅ Stopped");
            }, 500);
        };

        // 🧹 Очистка при выгрузке страницы
        window.addEventListener("beforeunload", () => {
            cleanup();
            if (audio?.src) {
                URL.revokeObjectURL(audio.src);
            }
        });
    </script>
</body>
</html>
